name: Bug report
description: Something is not working as expected.
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What you expected, and what happened instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Houdini version
      description: From the menu-bar header, or the DMG filename.
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
    validations:
      required: false
  - type: dropdown
    id: surface
    attributes:
      label: Which surface
      options:
        - Menu-bar app
        - Browser extension (web capture)
        - Transcript ingest (CLI/agent tools)
        - Updates
        - Other
    validations:
      required: true
